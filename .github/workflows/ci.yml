name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck jq
      - name: Run shellcheck
        run: shellcheck -x scripts/worktree-manager.sh scripts/lib/*.sh tests/*.sh tests/fixtures/*.sh

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update -y && sudo apt-get install -y jq
      - name: Configure git
        run: |
          git config --global user.email ci@example.com
          git config --global user.name CI
          git config --global init.defaultBranch main
      - name: Run single-repo smoke
        run: bash tests/e2e_smoke.sh
      - name: Run single-repo features
        run: bash tests/e2e_features.sh
      - name: Run workspace e2e
        run: bash tests/e2e_workspace.sh
