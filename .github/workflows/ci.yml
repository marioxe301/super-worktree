name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  skill-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate SKILL.md frontmatter
        run: bash scripts/validate-skills.sh
      - name: Simulate npx skills discovery
        run: |
          npx --yes skills@latest list . 2>&1 | tee /tmp/skills-list.log
          grep -q 'super-worktree' /tmp/skills-list.log

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck jq
      - name: Run shellcheck
        run: shellcheck -x scripts/worktree-manager.sh scripts/lib/*.sh tests/*.sh

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update -y && sudo apt-get install -y jq
      - name: Configure git
        run: |
          git config --global user.email ci@example.com
          git config --global user.name CI
          git config --global init.defaultBranch main
      - name: Run single-repo smoke
        run: bash tests/e2e_smoke.sh
      - name: Run single-repo features
        run: bash tests/e2e_features.sh
